<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#0a0a0f"/>
  <text x="300" y="36" font-size="15" fill="#6b6b80" text-anchor="middle" font-family="monospace" letter-spacing="2">WHICH LINE IS LONGER?</text>

  <text x="60" y="130" font-size="13" fill="#d4a017" font-family="monospace">A</text>
  <line x1="100" y1="130" x2="300" y2="130" stroke="#e8e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="80" y2="110" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="80" y2="150" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="130" x2="320" y2="110" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="130" x2="320" y2="150" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <text x="60" y="270" font-size="13" fill="#d4a017" font-family="monospace">B</text>
  <line x1="100" y1="270" x2="300" y2="270" stroke="#e8e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="270" x2="120" y2="250" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="270" x2="120" y2="290" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="270" x2="280" y2="250" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="270" x2="280" y2="290" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <text x="300" y="370" font-size="12" fill="#3a3a4a" text-anchor="middle" font-family="monospace">HOUSE OF TRIALS</text>
</svg>
