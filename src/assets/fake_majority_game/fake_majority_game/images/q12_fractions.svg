<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#0a0a0f"/>
  <text x="300" y="36" font-size="15" fill="#6b6b80" text-anchor="middle" font-family="monospace" letter-spacing="2">WHICH NUMBER IS LARGER?</text>
  <text x="300" y="58" font-size="12" fill="#3a3a4a" text-anchor="middle" font-family="monospace">(no calculator — use your instinct)</text>

  <rect x="80" y="90" width="180" height="190" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="170" y="165" font-size="72" fill="#e8e8f0" text-anchor="middle" font-family="monospace" font-weight="bold">3</text>
  <line x1="105" y1="195" x2="235" y2="195" stroke="#6b6b80" stroke-width="2"/>
  <text x="170" y="258" font-size="72" fill="#e8e8f0" text-anchor="middle" font-family="monospace" font-weight="bold">7</text>
  <text x="170" y="300" font-size="14" fill="#d4a017" text-anchor="middle" font-family="monospace">A</text>

  <rect x="340" y="90" width="180" height="190" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="430" y="165" font-size="72" fill="#e8e8f0" text-anchor="middle" font-family="monospace" font-weight="bold">4</text>
  <line x1="365" y1="195" x2="495" y2="195" stroke="#6b6b80" stroke-width="2"/>
  <text x="430" y="258" font-size="72" fill="#e8e8f0" text-anchor="middle" font-family="monospace" font-weight="bold">9</text>
  <text x="430" y="300" font-size="14" fill="#d4a017" text-anchor="middle" font-family="monospace">B</text>

  <text x="300" y="370" font-size="12" fill="#3a3a4a" text-anchor="middle" font-family="monospace">HOUSE OF TRIALS</text>
</svg>
